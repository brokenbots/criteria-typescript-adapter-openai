name: Publish Adapter

# Cross-compile the adapter for every supported platform with bun's --compile
# --target, lay the binaries out as bin/<os>/<arch>/<name>, and publish them as
# a single multi-platform, signed OCI artifact via the reusable
# brokenbots/publish-adapter action. The SDK is a file: dependency, checked out
# as a sibling and built first.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without leading v)'
        required: false
        default: '0.0.0-dev'

permissions:
  contents: read
  packages: write
  id-token: write # cosign keyless signing

env:
  ADAPTER_NAME: criteria-adapter-openai

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout adapter
        uses: actions/checkout@v4
        with:
          path: criteria-typescript-adapter-openai

      - name: Checkout SDK (sibling)
        uses: actions/checkout@v4
        with:
          repository: brokenbots/criteria-typescript-adapter-sdk
          path: criteria-typescript-adapter-sdk

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build SDK
        working-directory: criteria-typescript-adapter-sdk
        run: |
          bun install
          bun run build

      - name: Cross-compile adapter binaries
        working-directory: criteria-typescript-adapter-openai
        # bun-<os>-<arch> targets -> bin/<os>/<arch>/<name>, the layout
        # `criteria adapter publish` scans to build one multi-platform artifact.
        run: |
          set -euo pipefail
          bun install
          declare -A targets=(
            ["linux/amd64"]="bun-linux-x64"
            ["linux/arm64"]="bun-linux-arm64"
            ["darwin/arm64"]="bun-darwin-arm64"
          )
          for platform in "${!targets[@]}"; do
            outdir="artifact/bin/${platform}"
            mkdir -p "$outdir"
            echo "building ${platform} (${targets[$platform]})"
            bun build --compile --target="${targets[$platform]}" \
              index.ts --outfile "$outdir/${ADAPTER_NAME}"
          done

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish
        uses: brokenbots/publish-adapter@v0
        with:
          # Directory containing the multi-platform bin/<os>/<arch>/ tree.
          binary: ${{ github.workspace }}/criteria-typescript-adapter-openai/artifact
          registry: ghcr.io/${{ github.repository_owner }}/${{ env.ADAPTER_NAME }}:${{ steps.ver.outputs.tag }}
