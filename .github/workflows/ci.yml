name: CI

on:
  push:
    branches: [main, adapter-v2]
  pull_request:
    branches: [main, adapter-v2]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install
      - run: bun test

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        target: [linux-x64, linux-arm64, darwin-arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install
      - run: bun run build:${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: criteria-adapter-openai-${{ matrix.target }}
          path: out/adapter*
