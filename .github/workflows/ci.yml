name: CI

on:
  push:
    branches: [main, adapter-v2]
  pull_request:
    branches: [main, adapter-v2]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install
      - run: bun test

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        target: [linux-x64, linux-arm64, darwin-arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install
      - run: bun run build:${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: criteria-adapter-openai-${{ matrix.target }}
          path: out/adapter*

  # WS49 — vulnerability gate (osv-scanner). BLOCKING: reads bun.lock; tree clean.
  # Pinned google/osv-scanner-action by SHA (v2.3.8).
  osv-scan:
    name: Vulnerability scan (osv-scanner)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --config=osv-scanner.toml
            --recursive
            ./

  # WS50 — non-blocking dependency-freshness report (bun outdated).
  deps-report:
    name: Dependency freshness (report-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Report outdated dependencies
        run: |
          bun install || true
          {
            echo "### Outdated dependencies (bun outdated)"
            echo "\`\`\`"
            bun outdated || true
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

  all-checks:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [test, build, osv-scan]
    if: always()
    steps:
      - name: Verify required jobs succeeded
        run: |
          for r in "${{ needs.test.result }}" "${{ needs.build.result }}" "${{ needs.osv-scan.result }}"; do
            [ "$r" = "success" ] || { echo "a required job failed"; exit 1; }
          done
